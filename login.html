  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: white;
      --accent-green: #3fb950;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .card-header .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-header p {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--bg-tertiary);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      color: var(--text-secondary);
      border: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
    }

    .tab.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    /* FORM */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .form-input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-secondary); }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }

    .btn-submit:hover { background:#3fb950; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-google:hover {
      background: var(--bg-secondary);
      border-color: var(--accent);
    }

    .message {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 16px;
      display: none;
    }

    .message.success {
      background: rgba(63,185,80,0.1);
      border: 1px solid rgba(63,185,80,0.3);
      color: var(--accent-green);
    }

    .message.error {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      color: #f85149;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
    }

    footer a { color: var(--accent); text-decoration: none; }

  
  </style>
</head>

  <script>
    // Switch between sign in and sign up tabs
    function switchTab(tab) {
      const signinForm = document.getElementById('signinForm');
      const signupForm = document.getElementById('signupForm');
      const signinTab = document.getElementById('signinTab');
      const signupTab = document.getElementById('signupTab');

      if (tab === 'signin') {
        signinForm.style.display = 'block';
        signupForm.style.display = 'none';
        signinTab.classList.add('active');
        signupTab.classList.remove('active');
      } else {
        signinForm.style.display = 'none';
        signupForm.style.display = 'block';
        signupTab.classList.add('active');
        signinTab.classList.remove('active');
      }
      hideMessage();
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      msg.style.display = 'block';
    }

    function hideMessage() {
      document.getElementById('message').style.display = 'none';
    }

    // Sign In with Email
    async function signIn() {
      const email = document.getElementById('signinEmail').value.trim();
      const password = document.getElementById('signinPassword').value;
      const btn = document.getElementById('signinBtn');

      if (!email || !password) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showMessage(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        showMessage('✅ Signed in! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      }
    }

    // Sign Up with Email
    async function signUp() {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const btn = document.getElementById('signupBtn');

      if (!name || !email || !password) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const { error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { full_name: name } }
      });

      if (error) {
        showMessage(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      } else {
        showMessage('✅ Account created! Please check your email to confirm.', 'success');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    async function forgotPassword() {
  const email = document.getElementById('signinEmail').value.trim();
  if (!email) {
    showMessage('Please enter your email first then click forgot password.', 'error');
    return;
  }
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://rawmoon.io/login.html'
  });
  if (!error) {
    showMessage('✅ Password reset link sent! Check your email inbox.', 'success');
  } else {
    showMessage(error.message, 'error');
  }
}
    // Sign In with Google
    async function signInWithGoogle() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/index.html' }
      });
      if (error) showMessage(error.message, 'error');
    }

    // If already logged in redirect to home
    async function checkAuth() {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) window.location.href = 'index.html';
    }

    checkAuth();
  </script>
